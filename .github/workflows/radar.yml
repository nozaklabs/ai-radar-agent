name: AI Radar Agent

on:
  schedule:
    # Cairo is UTC+2 standard, UTC+3 during DST (Apr-Oct).
    # 09:00 UTC = 11:00 Cairo standard / 12:00 Cairo DST.
    # Sundays only.
    - cron: "0 9 * * 0"

  # Allow manual triggers from the Actions tab
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write  # Needed to commit updated radar.md back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run radar agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python -m src.main

      - name: Commit updated radar.md
        run: |
          git config user.name "radar-agent-bot"
          git config user.email "radar-agent@nozaklabs.local"
          git add radar.md
          if ! git diff --staged --quiet; then
            git commit -m "🛰️ Radar update — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to radar.md"
          fi
